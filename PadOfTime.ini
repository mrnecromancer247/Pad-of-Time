; ============================================================================
;  PadOfTime.ini  -  Prince of Persia: The Sands of Time gamepad proxy
;  Place next to dinput8.dll (in the game folder). Delete to use defaults.
;  Structure mirrors PadWithin.ini (the Warrior Within version of this mod:
;  https://github.com/mrnecromancer247/Pad-Within).
; ============================================================================

[General]
; Write a debug log (PadOfTime.log) next to the game exe. Off by default.
EnableLog=0
; DIAGNOSTIC: pass native controller through untouched and dump the raw
; state buffer (needs EnableLog=1 too). Use this to capture the real
; device's native layout before deciding anything needs fixing.
Passthrough=0
; Which controller to use if several are connected. -1 = auto.
ControllerIndex=-1
; If a pad never gets a proper GameController mapping, fall back to reading
; it as a raw joystick with a blind numeric axis/button guess. OFF by
; default - it's a guess, not a real mapping. 99% of the time the real fix
; is closing Steam's background controller hooks (see README's
; troubleshooting section) rather than this.
AllowRawFallback=0

[Sensitivity]
; --- Movement (left stick) ---
MoveDeadzone=0.18
; Outer calibration for worn/loose sticks that never reach full deflection.
MoveMaxStickRange=100

; --- Camera (right stick) ---
; Percentage; 50 is the formula's baseline (1.0x). 65 = a bit faster.
CameraSensitivity=65
CameraDeadzone=0.20
CameraMaxStickRange=100

; Reserved (only used if triggers ever act as buttons).
TriggerThreshold=0.20
; Cross-axis suppression: if one axis' magnitude is below this fraction of
; the other's, snap it to zero. Helps a controller-binding screen tell axes
; apart when a stick mechanically leaks a bit of the "other" axis while
; pushing what should be a pure vertical/horizontal direction.
; Keep this LOW (or 0) on modern Hall-effect sticks - they have very little
; center noise and almost no cross-axis leakage, so a value tuned for old
; potentiometer sticks just makes it needlessly hard to bind an axis near
; a diagonal. 0 disables it entirely.
AxisSnapRatio=0.05

[Axes]
InvertMoveY=0
InvertCameraY=0
InvertCameraX=0
; 0: RT -> Z(+), LT -> Z(-)      1: swapped
SwapTriggers=0
; 0: camera on Rx/Ry, triggers on Z   1: camera on Z/Rz, triggers on Rx
CameraOnZRz=0

[Spoof]
; Present a consistent controller identity regardless of which real pad is
; plugged in, in case the game's own gamepad config keys anything off
; VID/PID (Warrior Within's Profile.DAT does this; unconfirmed for SoT).
SpoofVidPid=0
VID=0x045e
PID=0x0007

[Buttons]
; rgbButtons index for each SDL button. -1 = unmapped. Confirmed against the
; game's own Controls -> Gamepad binding screen - see README's Quick Start
; table for what each one does in-game.
A=0
B=1
X=2
Y=3
LB=4
RB=5
Start=7
Back=6
LS=8
RS=9
